spring.application.name=guilda-aventureiros
server.port=8080

# Datasource — PostgreSQL (imagem leogloriainfnet/postgres-tp2-spring)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — nunca alterar o DDL do banco legado
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cache — Caffeine com TTL de 5 minutos (Questão 2)
# Justificativa: a view muda pouco entre chamadas; 5min reduz carga no banco
# sem comprometer a consistência para uso operacional.
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=5m,maximumSize=10

# Elasticsearch (Questão 3)
elasticsearch.host=localhost
elasticsearch.port=9200
