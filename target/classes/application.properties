spring.application.name=guilda-aventureiros
server.port=8080

# Datasource — PostgreSQL (imagem leogloriainfnet/postgres-tp2-spring)
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cache — Caffeine com TTL de 5 minutos 
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=5m,maximumSize=10

# Elasticsearch 
elasticsearch.host=localhost
elasticsearch.port=9200
